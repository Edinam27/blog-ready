version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-ready-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - API_PORT=3001
      # Provide your database URL or other env variables here:
      # - DATABASE_URL=postgres://...
    restart: unless-stopped
    volumes:
      - ./public/uploads:/app/public/uploads
